<section class="journey" id="journey" aria-label="My Journey">
    <header class="journey-header">
        <span class="section-eyebrow">Timeline</span>
        <h1 class="section-title">My Journey</h1>
        <p class="journey-subtitle">Scroll to explore each chapter of my path.</p>
    </header>

    <div #journeyContent class="journey-body">
        <div #stepsRail class="steps-rail" aria-hidden="true">
            <span class="steps-track"></span>
            <span class="steps-fill" [style.height.px]="lineFillPx()"></span>
        </div>

        @for (step of steps; track step.id; let i = $index) {
        <div class="step-row" [class.is-done]="i < activeIndex()" [class.is-active]="i === activeIndex()"
            [class.is-pending]="i > activeIndex()">
            <div class="step-aside" aria-hidden="true">
                <button type="button" #stepMarker class="step-marker" tabindex="-1" (click)="scrollToStep(i)"
                    [attr.aria-label]="'Go to ' + step.year + ': ' + step.title">
                    <span class="marker-ring" aria-hidden="true"></span>
                    <img class="step-star" src="/starIcon.png" alt="" width="40" height="40" />
                    <span class="step-year">{{ step.year }}</span>
                </button>
            </div>

            <article #stepSection class="step-card" [id]="step.id" [class.is-current]="i === activeIndex()">
                <div class="step-card-inner">
                    <div class="step-card-meta">
                        <span class="step-index">0{{ i + 1 }}</span>
                        <span class="step-year-badge">{{ step.year }}</span>
                    </div>

                    <header class="step-card-header">
                        <span class="step-index step-index--desktop">0{{ i + 1 }}</span>
                        <div class="step-card-titles">
                            <img
                                [src]="step.img"
                                [alt]="step.title + ' logo'"
                                [class]="step.clr"
                                loading="lazy"
                                decoding="async"
                            />
                            <div class="step-card-text">
                                <h2>{{ step.year }}</h2>
                                <p class="step-title">{{ step.title }}</p>
                            </div>
                        </div>
                    </header>

                    <div class="step-card-body">
                        <p>{{ step.description }}</p>
                    </div>
                </div>
            </article>
        </div>
        }
    </div>
</section>
