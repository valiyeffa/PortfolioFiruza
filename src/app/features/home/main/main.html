<div class="main-sect" #sect>
    <div class="container-fluid">
        <div class="frames">
            <img class="frame lt" width="100" src="/lefttop.png" alt="1">
            <img class="frame rt" width="100" src="/righttop.png" alt="2">
            <img class="frame lb" width="100" src="/leftbottom.png" alt="3">
            <img class="frame rb" width="100" src="/rightbottom.png" alt="4">
        </div>

        <div class="main-body">
            <nav>
                <a href="#work" (click)="scrollToSection($event, 'work')">Projects</a>
                <a href="#about" (click)="scrollToSection($event, 'about')">About</a>
                <a href="/cv/FiruzaValiyevaCV.pdf" target="_blank">Resume</a>
            </nav>

            <div class="text">
                <span class="welcome-tag">Welcome to my portfolio</span>
                <p class="name-first">Firuza</p>
                <p class="name-last d-flex align-items-center gap-2">
                    <img class="name-star" width="72" src="/starIcon.png" alt="" />
                    Valiyeva
                </p>
                <span class="prof">Frontend Developer</span>
            </div>

        </div>

        <div class="image">
            <img
                class="hero-portrait"
                src="/portfolioIMG.png"
                alt="Firuza Valiyeva portrait"
                width="1024"
                height="1536"
                fetchpriority="high"
                loading="eager"
                decoding="async"
            />

            <div class="arrow">
                <img src="/Vector.png" alt="Arrow">
                <span>Just scroll down</span>
            </div>

        </div>

        <div class="right-bottom">
            <div class="arrow">
                <!-- <img src="/Vector.png" alt="Arrow"> -->

                <span>Check out</span>

                <div class="links">
                    <a href="https://github.com/valiyeffa" target="_blank" rel="noopener noreferrer"
                        aria-label="GitHub">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/firuzeveliyeva2" target="_blank" rel="noopener noreferrer"
                        aria-label="LinkedIn">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                    <a href="mailto:firuzeveliyeva2@gmail.com" aria-label="Email">
                        <i class="fa-solid fa-envelope"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
