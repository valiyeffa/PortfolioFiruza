<div class="projects-sect" id="work" #sect>
    <div class="projects-glow" aria-hidden="true"></div>

    <div class="panel">
        <div class="projects-intro">
            <img class="intro-star" src="/starIcon.png" alt="" width="32" height="32" />
            <span class="section-eyebrow">Selected work</span>
            <h2 class="section-title">Projects</h2>
            <p class="projects-hint">Scroll to explore →</p>
        </div>

        <div class="cards-wrapper">
            @for (item of projects; track item.id) {
            <a [href]="item.link" target="_blank" class="card">
                <span class="card-num">{{item.id}}</span>
                <img
                    [src]="'/' + item.img"
                    [alt]="item.name"
                    loading="lazy"
                    decoding="async"
                />
                <h3>{{item.name}}</h3>
            </a>
            }
             <a href="https://github.com/valiyeffa" target="_blank" class="card">
                <span class="card-num">...</span>
                <h3>And others</h3>
            </a>
        </div>
    </div>
</div>
